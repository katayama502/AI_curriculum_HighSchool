<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: "Yu Gothic", "Roboto", sans-serif; background-color: #F8F9FA; color: #212529; }
        .slide-container { width: 1280px; min-height: 720px; background-color: #F8F9FA; position: relative; overflow: hidden; }
        .header { padding-top: 40px; padding-left: 60px; padding-right: 60px; }
        h1 { font-size: 48px; font-weight: 500; color: #339AF0; }
        .divider { height: 1px; background-color: #20C997; margin-top: 20px; width: 100%; }
        .content-area { padding-top: 30px; padding-left: 60px; padding-right: 60px; }
        .intro { font-size: 22px; color: #495057; font-weight: 300; margin-bottom: 25px; }
        .wireframe-grid { display: flex; gap: 30px; }
        .wf-box { flex: 1; border: 2px solid #dee2e6; background: white; border-radius: 8px; overflow: hidden; }
        .wf-title { background: #212529; color: white; font-size: 18px; font-weight: 500; padding: 10px 16px; }
        .wf-inner { padding: 16px; }
        .wf-nav { background: #339AF0; height: 36px; border-radius: 4px; display: flex; align-items: center; padding: 0 12px; gap: 12px; margin-bottom: 12px; }
        .wf-nav span { background: rgba(255,255,255,0.3); border-radius: 3px; height: 14px; }
        .wf-nav .logo { width: 70px; }
        .wf-nav .link { width: 40px; }
        .wf-hero { background: #e9ecef; height: 80px; border-radius: 4px; margin-bottom: 10px; display: flex; align-items: center; justify-content: center; }
        .wf-hero span { font-size: 13px; color: #868e96; }
        .wf-cards { display: flex; gap: 8px; margin-bottom: 10px; }
        .wf-card { flex: 1; background: #f1f3f5; border-radius: 4px; height: 60px; display: flex; align-items: center; justify-content: center; font-size: 12px; color: #868e96; }
        .wf-input { display: flex; gap: 8px; margin-bottom: 10px; }
        .wf-field { flex: 1; background: #f1f3f5; border-radius: 4px; height: 34px; }
        .wf-btn { background: #339AF0; border-radius: 4px; height: 34px; width: 70px; display: flex; align-items: center; justify-content: center; font-size: 12px; color: white; }
        .wf-list { display: flex; flex-direction: column; gap: 6px; }
        .wf-row { background: #f1f3f5; border-radius: 4px; height: 32px; display: flex; align-items: center; padding: 0 10px; gap: 8px; }
        .wf-row-dot { width: 10px; height: 10px; background: #339AF0; border-radius: 50%; }
        .wf-row-line { flex: 1; background: #dee2e6; height: 8px; border-radius: 2px; }
        .wf-row-tag { background: #20C997; color: white; font-size: 10px; padding: 2px 6px; border-radius: 3px; }
        .tips { margin-top: 20px; display: flex; gap: 16px; }
        .tip-card { flex: 1; background: white; border-left: 4px solid #339AF0; padding: 12px 16px; border-radius: 4px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .tip-label { font-size: 16px; font-weight: 600; color: #339AF0; margin-bottom: 6px; }
        .tip-text { font-size: 16px; color: #495057; line-height: 1.5; }
        .tip-card.teal { border-left-color: #20C997; }
        .tip-card.teal .tip-label { color: #20C997; }
        .tip-card.dark { border-left-color: #212529; }
        .tip-card.dark .tip-label { color: #212529; }
    </style>
</head>
<body>
    <div class="slide-container">
        <div class="header">
            <h1>ワイヤーフレーム設計</h1>
            <div class="divider"></div>
        </div>
        <div class="content-area">
            <p class="intro">ワイヤーフレームとは、画面のレイアウトを「骨格」だけで描いた設計図です。コーディング前に画面構成を確認・合意するために使います。</p>
            <div class="wireframe-grid">
                <div class="wf-box">
                    <div class="wf-title"><i class="fas fa-home"></i> ホーム画面（一覧）</div>
                    <div class="wf-inner">
                        <div class="wf-nav">
                            <span class="logo"></span>
                            <span class="link"></span>
                            <span class="link"></span>
                        </div>
                        <div class="wf-input">
                            <div class="wf-field"></div>
                            <div class="wf-btn">追加</div>
                        </div>
                        <div class="wf-list">
                            <div class="wf-row"><div class="wf-row-dot"></div><div class="wf-row-line"></div><div class="wf-row-tag">完了</div></div>
                            <div class="wf-row"><div class="wf-row-dot"></div><div class="wf-row-line"></div></div>
                            <div class="wf-row"><div class="wf-row-dot"></div><div class="wf-row-line"></div></div>
                        </div>
                    </div>
                </div>
                <div class="wf-box">
                    <div class="wf-title"><i class="fas fa-sign-in-alt"></i> ログイン画面</div>
                    <div class="wf-inner">
                        <div class="wf-nav">
                            <span class="logo"></span>
                        </div>
                        <div class="wf-hero"><span>ロゴ / キャッチコピー</span></div>
                        <div class="wf-field" style="height:34px;background:#f1f3f5;border-radius:4px;margin-bottom:8px;"></div>
                        <div class="wf-field" style="height:34px;background:#f1f3f5;border-radius:4px;margin-bottom:8px;"></div>
                        <div class="wf-btn" style="width:100%;justify-content:center;font-size:14px;">ログイン</div>
                    </div>
                </div>
                <div class="wf-box">
                    <div class="wf-title"><i class="fas fa-edit"></i> 詳細・編集画面</div>
                    <div class="wf-inner">
                        <div class="wf-nav">
                            <span class="logo"></span>
                        </div>
                        <div style="font-size:13px;color:#868e96;margin-bottom:6px;">タイトル</div>
                        <div class="wf-field" style="height:34px;background:#f1f3f5;border-radius:4px;margin-bottom:8px;"></div>
                        <div style="font-size:13px;color:#868e96;margin-bottom:6px;">メモ</div>
                        <div style="background:#f1f3f5;border-radius:4px;height:60px;margin-bottom:8px;"></div>
                        <div style="display:flex;gap:8px;">
                            <div class="wf-btn" style="flex:1;justify-content:center;background:#20C997;">保存</div>
                            <div class="wf-btn" style="flex:1;justify-content:center;background:#dee2e6;color:#495057;">削除</div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="tips">
                <div class="tip-card">
                    <div class="tip-label"><i class="fas fa-pencil-alt"></i> ツール</div>
                    <div class="tip-text">Figma・Excalidraw・紙と鉛筆で素早く描く</div>
                </div>
                <div class="tip-card teal">
                    <div class="tip-label"><i class="fas fa-lightbulb"></i> コツ</div>
                    <div class="tip-text">デザインより「何があるか」を先に決める</div>
                </div>
                <div class="tip-card dark">
                    <div class="tip-label"><i class="fas fa-robot"></i> Claude活用</div>
                    <div class="tip-text">「HTML+CSSでワイヤーフレームを作って」と頼む</div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>

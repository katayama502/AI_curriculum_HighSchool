<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: "Yu Gothic", "Roboto", sans-serif; background-color: #F8F9FA; color: #212529; }
        .slide-container { 
            width: 1280px; 
            min-height: 720px; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            background: linear-gradient(135deg, #F8F9FA 0%, #e9ecef 100%);
            position: relative;
            overflow: hidden;
        }
        .content-block {
            background: white;
            padding: 60px 80px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            text-align: center;
            z-index: 10;
            width: 80%;
            max-width: 1000px;
        }
        h1 {
            font-size: 56px;
            font-weight: 500;
            color: #339AF0;
            margin-bottom: 20px;
            letter-spacing: 2px;
        }
        .divider {
            height: 1px;
            background: linear-gradient(to right, transparent, #20C997, transparent);
            margin: 30px 0;
        }
        h2 {
            font-size: 36px;
            font-weight: 300;
            color: #495057;
            margin-bottom: 40px;
        }
        .footer-badge {
            display: inline-block;
            background-color: #212529;
            color: white;
            padding: 10px 24px;
            border-radius: 30px;
            font-size: 20px;
            font-weight: 500;
            letter-spacing: 1px;
        }
        .bg-shape-1 {
            position: absolute;
            top: -100px;
            left: -100px;
            width: 400px;
            height: 400px;
            background: rgba(51, 154, 240, 0.1);
            border-radius: 50%;
            z-index: 1;
        }
        .bg-shape-2 {
            position: absolute;
            bottom: -150px;
            right: -100px;
            width: 500px;
            height: 500px;
            background: rgba(32, 201, 151, 0.1);
            border-radius: 50%;
            z-index: 1;
        }
    </style>
</head>
<body>
    <div class="slide-container">
        <div class="bg-shape-1"></div>
        <div class="bg-shape-2"></div>
        <div class="content-block">
            <h1>プロンプトエンジニアリング入門</h1>
            <div class="divider"></div>
            <h2>～AIから最高の答えを引き出す技術～</h2>
            <div class="footer-badge">第2回 / 全20回</div>
        </div>
    </div>
</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: "Yu Gothic", "Roboto", sans-serif; background-color: #F8F9FA; color: #212529; }
        .slide-container { width: 1280px; min-height: 720px; background-color: #F8F9FA; position: relative; overflow: hidden; }
        .header { padding-top: 40px; padding-left: 60px; padding-right: 60px; }
        h1 { font-size: 48px; font-weight: 500; color: #339AF0; }
        .divider { height: 1px; background-color: #20C997; margin-top: 20px; width: 100%; }
        .content-area { padding-top: 28px; padding-left: 60px; padding-right: 60px; }
        .intro { font-size: 20px; color: #495057; margin-bottom: 20px; }
        .comp-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 18px; }
        .comp-card { background: white; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.06); overflow: hidden; }
        .comp-header { background: #212529; padding: 10px 16px; font-size: 15px; color: #20C997; font-weight: 600; }
        .comp-preview { padding: 16px; display: flex; flex-direction: column; gap: 10px; }
        .btn-row { display: flex; gap: 8px; flex-wrap: wrap; }
        .btn-p { background: #339AF0; color: white; padding: 8px 16px; border-radius: 6px; font-size: 14px; cursor: pointer; }
        .btn-s { background: white; color: #339AF0; border: 2px solid #339AF0; padding: 8px 16px; border-radius: 6px; font-size: 14px; }
        .btn-d { background: #ff6b6b; color: white; padding: 8px 16px; border-radius: 6px; font-size: 14px; }
        .input-demo { background: #f1f3f5; border: 2px solid #dee2e6; border-radius: 6px; padding: 8px 12px; font-size: 14px; color: #868e96; width: 100%; }
        .input-demo.focus { border-color: #339AF0; background: white; color: #212529; }
        .input-label { font-size: 13px; font-weight: 600; color: #495057; margin-bottom: 4px; }
        .card-demo { border: 1px solid #dee2e6; border-radius: 8px; overflow: hidden; }
        .card-img { background: linear-gradient(135deg, #339AF0, #20C997); height: 60px; }
        .card-body { padding: 10px 12px; }
        .card-title-demo { font-size: 14px; font-weight: 600; color: #212529; margin-bottom: 4px; }
        .card-text-demo { font-size: 12px; color: #868e96; }
        .nav-demo { background: #212529; border-radius: 6px; padding: 8px 12px; display: flex; align-items: center; gap: 12px; }
        .nav-logo-demo { background: #339AF0; width: 24px; height: 24px; border-radius: 4px; }
        .nav-links { display: flex; gap: 10px; flex: 1; justify-content: flex-end; }
        .nav-link { font-size: 12px; color: rgba(255,255,255,0.7); padding: 4px 8px; border-radius: 3px; }
        .nav-link.active { color: white; background: rgba(51,154,240,0.3); }
        .badge-row { display: flex; gap: 6px; flex-wrap: wrap; }
        .badge { padding: 4px 10px; border-radius: 12px; font-size: 13px; font-weight: 600; }
        .badge-blue { background: #d0ebff; color: #1971c2; }
        .badge-green { background: #d3f9d8; color: #2b8a3e; }
        .badge-red { background: #ffe3e3; color: #c92a2a; }
        .badge-yellow { background: #fff3cd; color: #856404; }
        .alert-demo { background: #d0ebff; border-left: 4px solid #339AF0; padding: 8px 12px; border-radius: 4px; font-size: 13px; color: #1971c2; display: flex; gap: 8px; align-items: center; }
        .comp-desc { padding: 0 16px 12px; font-size: 13px; color: #868e96; line-height: 1.4; }
    </style>
</head>
<body>
    <div class="slide-container">
        <div class="header">
            <h1>UIコンポーネントの設計</h1>
            <div class="divider"></div>
        </div>
        <div class="content-area">
            <p class="intro">UIは再利用可能な「部品（コンポーネント）」の組み合わせで作ります。よく使うコンポーネントを覚えておきましょう。</p>
            <div class="comp-grid">
                <div class="comp-card">
                    <div class="comp-header"><i class="fas fa-hand-pointer"></i> ボタン</div>
                    <div class="comp-preview">
                        <div class="btn-row"><div class="btn-p">Primary</div><div class="btn-s">Secondary</div></div>
                        <div class="btn-d" style="display:inline-block;font-size:14px;padding:8px 16px;border-radius:6px;text-align:center;">Danger</div>
                    </div>
                    <div class="comp-desc">主要操作・補助操作・危険操作で色を使い分ける</div>
                </div>
                <div class="comp-card">
                    <div class="comp-header"><i class="fas fa-keyboard"></i> フォーム</div>
                    <div class="comp-preview">
                        <div class="input-label">タイトル</div>
                        <div class="input-demo">テキストを入力...</div>
                        <div class="input-label" style="color:#339AF0">タイトル（フォーカス）</div>
                        <div class="input-demo focus">読書記録アプリ</div>
                    </div>
                    <div class="comp-desc">フォーカス時に枠色を変えて操作中であることを示す</div>
                </div>
                <div class="comp-card">
                    <div class="comp-header"><i class="fas fa-square"></i> カード</div>
                    <div class="comp-preview">
                        <div class="card-demo">
                            <div class="card-img"></div>
                            <div class="card-body">
                                <div class="card-title-demo">本のタイトル</div>
                                <div class="card-text-demo">著者名・評価 ★★★★☆</div>
                            </div>
                        </div>
                    </div>
                    <div class="comp-desc">関連する情報をまとめて表示。影で浮いた印象を演出</div>
                </div>
                <div class="comp-card">
                    <div class="comp-header"><i class="fas fa-bars"></i> ナビゲーション</div>
                    <div class="comp-preview">
                        <div class="nav-demo">
                            <div class="nav-logo-demo"></div>
                            <div class="nav-links">
                                <div class="nav-link active">一覧</div>
                                <div class="nav-link">追加</div>
                                <div class="nav-link">設定</div>
                            </div>
                        </div>
                        <div class="badge-row">
                            <div class="badge badge-blue">読書中</div>
                            <div class="badge badge-green">完了</div>
                            <div class="badge badge-red">積読</div>
                        </div>
                        <div class="alert-demo"><i class="fas fa-info-circle"></i> 保存しました！</div>
                    </div>
                    <div class="comp-desc">バッジで状態表示、アラートでフィードバックを伝える</div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: "Yu Gothic", "Roboto", sans-serif; background-color: #F8F9FA; color: #212529; }
        .slide-container { 
            width: 1280px; 
            min-height: 720px; 
            background-color: #F8F9FA;
            position: relative;
            overflow: hidden;
        }
        .header {
            padding-top: 40px;
            padding-left: 60px;
            padding-right: 60px;
        }
        h1 {
            font-size: 48px;
            font-weight: 500;
            color: #339AF0;
            margin-top: 0;
        }
        .divider {
            height: 1px;
            background-color: #20C997;
            margin-top: 20px;
            width: 100%;
        }
        .content-area {
            padding-top: 40px;
            padding-left: 60px;
            padding-right: 60px;
            display: flex;
            gap: 60px;
        }
        .text-column {
            flex: 1;
        }
        .visual-column {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background-color: #e9ecef;
            height: 520px;
        }
        h2 {
            font-size: 32px;
            font-weight: 500;
            color: #212529;
            margin-top: 0;
        }
        p {
            font-size: 24px;
            font-weight: 300;
            line-height: 1.6;
            color: #495057;
            margin-top: 30px;
        }
        .highlight-text {
            font-size: 26px;
            font-weight: 500;
            color: #339AF0;
            margin-top: 40px;
            line-height: 1.6;
            border-top: 2px solid #339AF0;
            padding-top: 20px;
        }
        .flow-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }
        .flow-box {
            background-color: white;
            width: 320px;
            height: 100px;
            border: 2px solid #212529;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .flow-box.accent {
            border-color: #339AF0;
            background-color: #339AF0;
        }
        .flow-icon {
            font-size: 32px;
            color: #339AF0;
            margin-top: 0;
        }
        .flow-box.accent .flow-icon {
            color: white;
        }
        .flow-text {
            font-size: 22px;
            font-weight: 500;
            color: #212529;
            margin-top: 10px;
        }
        .flow-box.accent .flow-text {
            color: white;
        }
        .flow-arrow {
            font-size: 24px;
            color: #adb5bd;
        }
    </style>
</head>
<body>
    <div class="slide-container">
        <div class="header">
            <h1>プロンプトとは？</h1>
            <div class="divider"></div>
        </div>
        <div class="content-area">
            <div class="text-column">
                <h2>AIへの「指示書」がプロンプト</h2>
                <p>プロンプト（Prompt）とは、AIに与える入力テキストのことです。同じAIでも、プロンプトの質によって回答の質は劇的に変わります。</p>
                <p>「プロンプトエンジニアリング」とは、AIから最高の回答を引き出すためのプロンプト設計技術です。</p>
                <div class="highlight-text">
                    これはAI時代の必須スキルであり、プログラミングと同様に、論理的思考力と創造力の両方が求められます。
                </div>
            </div>
            <div class="visual-column">
                <div class="flow-container">
                    <div class="flow-box">
                        <div class="flow-icon"><i class="fas fa-user"></i></div>
                        <div class="flow-text">人間</div>
                    </div>
                    <div class="flow-arrow"><i class="fas fa-arrow-down"></i></div>
                    <div class="flow-box accent">
                        <div class="flow-icon"><i class="fas fa-keyboard"></i></div>
                        <div class="flow-text">プロンプト（指示）</div>
                    </div>
                    <div class="flow-arrow"><i class="fas fa-arrow-down"></i></div>
                    <div class="flow-box">
                        <div class="flow-icon"><i class="fas fa-robot"></i></div>
                        <div class="flow-text">AI (Claude)</div>
                    </div>
                    <div class="flow-arrow"><i class="fas fa-arrow-down"></i></div>
                    <div class="flow-box">
                        <div class="flow-icon"><i class="fas fa-lightbulb"></i></div>
                        <div class="flow-text">高品質な回答</div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>

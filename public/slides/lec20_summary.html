<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: "Yu Gothic", "Roboto", sans-serif; background-color: #F8F9FA; color: #212529; }
        .slide-container { width: 1280px; min-height: 720px; background-color: #F8F9FA; position: relative; overflow: hidden; }
        .header { padding-top: 40px; padding-left: 60px; padding-right: 60px; }
        h1 { font-size: 48px; font-weight: 500; color: #339AF0; }
        .divider { height: 1px; background-color: #20C997; margin-top: 20px; width: 100%; }
        .content-area { padding-top: 30px; padding-left: 60px; padding-right: 60px; display: flex; flex-direction: column; gap: 22px; }
        .summary-block { background: white; padding: 22px 30px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); border-left: 6px solid #339AF0; }
        .summary-text { font-size: 22px; font-weight: 300; line-height: 1.8; color: #495057; }
        .action-row { display: flex; gap: 16px; }
        .action-card { flex: 1; background: white; border-radius: 8px; padding: 18px 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); border-top: 4px solid #20C997; display: flex; align-items: flex-start; gap: 14px; }
        .action-card:nth-child(2) { border-top-color: #339AF0; }
        .action-card:nth-child(3) { border-top-color: #f59f00; }
        .action-icon { font-size: 24px; color: #20C997; margin-top: 2px; }
        .action-card:nth-child(2) .action-icon { color: #339AF0; }
        .action-card:nth-child(3) .action-icon { color: #f59f00; }
        .action-text {}
        .action-title { font-size: 17px; font-weight: 700; color: #212529; margin-bottom: 4px; }
        .action-desc { font-size: 14px; color: #868e96; line-height: 1.5; }
        .final-msg { background: #212529; border-radius: 8px; padding: 16px 28px; text-align: center; font-size: 20px; color: #f8f9fa; font-weight: 300; }
        .final-msg strong { color: #a9dc76; }
    </style>
</head>
<body>
    <div class="slide-container">
        <div class="header">
            <h1>今日のまとめ</h1>
            <div class="divider"></div>
        </div>
        <div class="content-area">
            <div class="summary-block">
                <p class="summary-text">
                    全20回で、AIの基礎からフルスタック Web 開発・デプロイ・発表まで一通り経験しました。<br>
                    Claude Code を使いながら、本物のエンジニアと同じワークフローを学んできました。
                </p>
            </div>
            <div class="action-row">
                <div class="action-card">
                    <div class="action-icon"><i class="fas fa-plus-circle"></i></div>
                    <div class="action-text">
                        <div class="action-title">アプリに機能を追加し続ける</div>
                        <div class="action-desc">小さな改善を毎週1つ。積み重ねがポートフォリオの厚みになる</div>
                    </div>
                </div>
                <div class="action-card">
                    <div class="action-icon"><i class="fab fa-github"></i></div>
                    <div class="action-text">
                        <div class="action-title">GitHub を毎日 green にする</div>
                        <div class="action-desc">毎日 commit する習慣は最強のポートフォリオになる</div>
                    </div>
                </div>
                <div class="action-card">
                    <div class="action-icon"><i class="fas fa-users"></i></div>
                    <div class="action-text">
                        <div class="action-title">ハッカソン・勉強会に参加</div>
                        <div class="action-desc">同世代のエンジニアとつながり、刺激をもらい合う場所に行こう</div>
                    </div>
                </div>
            </div>
            <div class="final-msg">
                <strong>おめでとう！</strong> — 君たちは今日からフルスタックエンジニアだ。作り続けよう。
            </div>
        </div>
    </div>
</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: "Yu Gothic", "Roboto", sans-serif; background-color: #F8F9FA; color: #212529; }
        .slide-container {
            width: 1280px;
            min-height: 720px;
            background-color: #F8F9FA;
        }
        .header { padding-top: 40px; padding-left: 60px; padding-right: 60px; }
        h1 { font-size: 46px; font-weight: 500; color: #339AF0; }
        .divider { height: 2px; background-color: #20C997; margin-top: 16px; }
        .content-area { padding-top: 36px; padding-left: 60px; padding-right: 60px; }
        .summary-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
            margin-bottom: 28px;
        }
        .summary-item {
            background: white;
            padding: 20px 24px;
            display: flex;
            align-items: flex-start;
            gap: 16px;
        }
        .check-num {
            width: 40px;
            height: 40px;
            background: #20C997;
            color: white;
            font-size: 20px;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        .summary-text { font-size: 20px; color: #212529; line-height: 1.5; }
        .summary-sub { font-size: 15px; color: #6C757D; margin-top: 4px; }
        .homework-box {
            background: #212529;
            color: white;
            padding: 20px 28px;
            display: flex;
            align-items: center;
            gap: 20px;
        }
        .hw-label {
            background: #339AF0;
            color: white;
            padding: 8px 16px;
            font-size: 18px;
            font-weight: 700;
            flex-shrink: 0;
        }
        .hw-text { font-size: 20px; line-height: 1.5; }
    </style>
</head>
<body>
    <div class="slide-container">
        <div class="header">
            <h1>第3回 まとめ</h1>
            <div class="divider"></div>
        </div>
        <div class="content-area">
            <div class="summary-grid">
                <div class="summary-item">
                    <div class="check-num">1</div>
                    <div>
                        <div class="summary-text">教科学習に積極的に活用しよう</div>
                        <div class="summary-sub">数学・英語・理科など幅広い教科で使える</div>
                    </div>
                </div>
                <div class="summary-item">
                    <div class="check-num">2</div>
                    <div>
                        <div class="summary-text">情報収集は「補助」として使う</div>
                        <div class="summary-sub">重要な情報は必ず一次情報で確認する</div>
                    </div>
                </div>
                <div class="summary-item">
                    <div class="check-num">3</div>
                    <div>
                        <div class="summary-text">レポートは「補助」として活用</div>
                        <div class="summary-sub">構成案・添削・表現改善に役立てる</div>
                    </div>
                </div>
                <div class="summary-item">
                    <div class="check-num">4</div>
                    <div>
                        <div class="summary-text">ハルシネーションに注意！</div>
                        <div class="summary-sub">AIは嘘をつくことがある。批判的思考を持つ</div>
                    </div>
                </div>
            </div>
            <div class="homework-box">
                <div class="hw-label">📝 宿題</div>
                <div class="hw-text">明日のテスト範囲をClaudeで要約してみよう！<br>
                    <span style="font-size:16px; color:#adb5bd;">「〇〇の単元を高校1年生向けに要点3つにまとめてください」と試してみよう</span>
                </div>
            </div>
        </div>
    </div>
</body>
</html>

<!DOCTYPE html><html lang="ja"><head><meta charset="UTF-8">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
<style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:"Yu Gothic","Roboto",sans-serif;background:#F8F9FA;color:#212529}.slide-container{width:1280px;min-height:720px;background:#F8F9FA}.header{padding:40px 60px 0}h1{font-size:48px;font-weight:500;color:#339AF0}.divider{height:1px;background:#20C997;margin-top:20px}.content-area{padding:28px 60px}.agenda-grid{display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-bottom:18px}.a-card{background:white;border-radius:10px;padding:22px;box-shadow:0 4px 12px rgba(0,0,0,.05)}.a-card:nth-child(1){border-top:4px solid #339AF0}.a-card:nth-child(2){border-top:4px solid #20C997}.a-card:nth-child(3){border-top:4px solid #E67700}.a-card:nth-child(4){border-top:4px solid #fa5252}.a-num{font-size:32px;font-weight:700}.a-card:nth-child(1) .a-num{color:#339AF0}.a-card:nth-child(2) .a-num{color:#20C997}.a-card:nth-child(3) .a-num{color:#E67700}.a-card:nth-child(4) .a-num{color:#fa5252}.a-title{font-size:20px;font-weight:700;color:#212529;margin:5px 0 6px}.a-desc{font-size:15px;font-weight:300;color:#495057;line-height:1.6}.goal{background:#212529;color:white;border-radius:8px;padding:16px 24px;display:flex;gap:14px;align-items:center}.goal i{font-size:24px;color:#20C997}.goal span{font-size:19px;font-weight:300}.goal strong{color:#339AF0}</style></head><body>
<div class="slide-container"><div class="header"><h1>今日の授業の流れ</h1><div class="divider"></div></div>
<div class="content-area"><div class="agenda-grid">

<div class="a-card"><div class="a-num">02</div><div class="a-title">ブレインストーミング技術</div><div class="a-desc">AIを使ったアイデア発散・収束の実践的テクニック。発想の壁を突破する方法</div></div>
<div class="a-card"><div class="a-num">03</div><div class="a-title">創作・ライティング</div><div class="a-desc">小説・詩・シナリオ・企画書など、創作活動でのClaude活用術</div></div>
<div class="a-card"><div class="a-num">04</div><div class="a-title">プレゼン・発表づくり</div><div class="a-desc">伝わる発表資料の構成・デザイン・練習にAIを活かす方法</div></div>
</div>
<div class="goal"><i class="fas fa-bullseye"></i><span>今日のゴール：AIを<strong>「創造性の増幅器」</strong>として使いこなし、アイデアの質と量を劇的に上げる</span></div>
</div></div></body></html>

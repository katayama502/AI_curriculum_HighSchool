<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: "Yu Gothic", "Roboto", sans-serif; background-color: #F8F9FA; color: #212529; }
        .slide-container { 
            width: 1280px; 
            min-height: 720px; 
            background-color: #F8F9FA;
            position: relative;
            overflow: hidden;
        }
        .header {
            padding-top: 40px;
            padding-left: 60px;
            padding-right: 60px;
        }
        h1 {
            font-size: 48px;
            font-weight: 500;
            color: #339AF0;
            margin-bottom: 10px;
        }
        .divider {
            height: 1px;
            background-color: #20C997;
            margin-top: 20px;
            width: 100%;
        }
        .content-area {
            padding-top: 40px;
            padding-left: 60px;
            padding-right: 60px;
            display: flex;
            flex-direction: column;
            gap: 40px;
        }
        h2 {
            font-size: 32px;
            font-weight: 500;
            color: #212529;
            margin-bottom: 10px;
        }
        .summary-block {
            background-color: white;
            padding: 20px; /* reduced from 40px to save vertical space */
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            border-left: 6px solid #339AF0;
        }
        .summary-text {
            font-size: 26px;
            font-weight: 300;
            line-height: 1.8;
            color: #495057;
        }
        .homework-block {
            background-color: white;
            padding: 20px; /* reduced from 40px to save vertical space */
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            border-left: 6px solid #20C997;
            display: flex;
            align-items: center;
            gap: 30px;
        }
        .homework-icon {
            font-size: 48px;
            color: #20C997;
        }
        .homework-content h3 {
            font-size: 28px;
            font-weight: 500;
            color: #212529;
            margin-bottom: 10px;
        }
        .homework-content p {
            font-size: 24px;
            font-weight: 500;
            color: #495057;
        }
        .next-preview {
            margin-top: 10px;
            font-size: 24px;
            font-weight: 500;
            color: #339AF0;
            text-align: right;
        }
    </style>
</head>
<body>
    <div class="slide-container">
        <div class="header">
            <h1>今日のまとめ</h1>
            <div class="divider"></div>
        </div>
        <div class="content-area">
            <h2>第1回で学んだこと</h2>
            
            <div class="summary-block">
                <p class="summary-text">
                    AIとは人間の知能を模倣する技術であり、生成AIはLLMによって自然な文章を生成します。<br>
                    ClaudeはAnthropic社が開発した安全性重視のAIで、今日からすぐに使い始めることができます。
                </p>
            </div>
            
            <div class="homework-block">
                <div class="homework-icon">
                    <i class="fas fa-pencil-alt"></i>
                </div>
                <div class="homework-content">
                    <h3>宿題</h3>
                    <p>Claudeに自分の好きなことについて3つ質問してみよう！</p>
                </div>
            </div>
            
            <div class="next-preview">
                <i class="fas fa-arrow-right"></i> 次回は、Claudeから最高の回答を引き出す「プロンプトエンジニアリング」を学びます。
            </div>
        </div>
    </div>
</body>
</html>

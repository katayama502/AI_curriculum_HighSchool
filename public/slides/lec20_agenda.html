<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: "Yu Gothic", "Roboto", sans-serif; background-color: #F8F9FA; color: #212529; }
        .slide-container { width: 1280px; min-height: 720px; background-color: #F8F9FA; position: relative; overflow: hidden; }
        .header { padding-top: 40px; padding-left: 60px; padding-right: 60px; }
        h1 { font-size: 48px; font-weight: 500; color: #339AF0; }
        .divider { height: 1px; background-color: #20C997; margin-top: 20px; width: 100%; }
        .content-area { padding-top: 30px; padding-left: 60px; padding-right: 60px; display: flex; gap: 60px; }
        .agenda-list { flex: 1.2; }
        .agenda-item { display: flex; align-items: center; gap: 20px; padding: 16px 0; border-bottom: 1px solid #dee2e6; }
        .agenda-num { width: 44px; height: 44px; background-color: #339AF0; color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; font-weight: 700; flex-shrink: 0; }
        .agenda-num.teal { background-color: #20C997; }
        .agenda-text { font-size: 22px; font-weight: 400; color: #212529; }
        .goal-panel { flex: 0.8; background: #212529; border-radius: 12px; padding: 36px 30px; display: flex; flex-direction: column; justify-content: center; }
        .goal-title { font-size: 16px; color: #adb5bd; letter-spacing: 2px; margin-bottom: 20px; }
        .goal-item { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
        .goal-item i { color: #a9dc76; font-size: 18px; }
        .goal-item span { font-size: 18px; color: #f8f9fa; line-height: 1.5; }
    </style>
</head>
<body>
    <div class="slide-container">
        <div class="header">
            <h1>第20回 今日のアジェンダ</h1>
            <div class="divider"></div>
        </div>
        <div class="content-area">
            <div class="agenda-list">
                <div class="agenda-item">
                    <div class="agenda-num">1</div>
                    <div class="agenda-text">最終発表の準備・デモの仕上げ方</div>
                </div>
                <div class="agenda-item">
                    <div class="agenda-num">2</div>
                    <div class="agenda-text">プレゼンテーションのコツ</div>
                </div>
                <div class="agenda-item">
                    <div class="agenda-num">3</div>
                    <div class="agenda-text">20回コースの振り返り</div>
                </div>
                <div class="agenda-item">
                    <div class="agenda-num teal">4</div>
                    <div class="agenda-text">ポートフォリオの作り方・公開</div>
                </div>
                <div class="agenda-item">
                    <div class="agenda-num teal">5</div>
                    <div class="agenda-text">これからの学習ロードマップ</div>
                </div>
                <div class="agenda-item">
                    <div class="agenda-num teal">6</div>
                    <div class="agenda-text">最終発表 & フィードバック</div>
                </div>
            </div>
            <div class="goal-panel">
                <div class="goal-title">THIS SESSION'S GOALS</div>
                <div class="goal-item"><i class="fas fa-check-circle"></i><span>自分の作品を人前で発表できる</span></div>
                <div class="goal-item"><i class="fas fa-check-circle"></i><span>20回で身につけたことを整理できる</span></div>
                <div class="goal-item"><i class="fas fa-check-circle"></i><span>次に何を学べばいいか分かる</span></div>
                <div class="goal-item"><i class="fas fa-check-circle"></i><span>ポートフォリオが公開された状態</span></div>
            </div>
        </div>
    </div>
</body>
</html>

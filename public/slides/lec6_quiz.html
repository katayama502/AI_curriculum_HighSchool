<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: "Yu Gothic", "Roboto", sans-serif; background-color: #F8F9FA; color: #212529; }
        .slide-container { width: 1280px; min-height: 720px; background-color: #F8F9FA; }
        .header { padding: 40px 60px 0; }
        h1 { font-size: 48px; font-weight: 500; color: #339AF0; }
        .divider { height: 1px; background-color: #20C997; margin-top: 20px; }
        .content-area { padding: 26px 60px; }
        h2 { font-size: 28px; font-weight: 500; color: #212529; margin-bottom: 20px; }
        .quiz-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 16px; }
        .quiz-card { background: white; border-radius: 8px; padding: 20px 22px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .q-num { font-size: 14px; font-weight: 700; color: #339AF0; margin-bottom: 8px; }
        .q-text { font-size: 21px; font-weight: 500; color: #212529; margin-bottom: 14px; line-height: 1.4; }
        .choices { display: flex; flex-direction: column; gap: 8px; }
        .choice { display: flex; align-items: center; gap: 12px; padding: 8px 14px; border: 2px solid #dee2e6; border-radius: 6px; }
        .choice.correct { border-color: #20C997; background: #ebfbee; }
        .c-label { font-size: 16px; font-weight: 700; color: #868e96; min-width: 22px; }
        .c-label.correct { color: #20C997; }
        .c-text { font-size: 17px; font-weight: 300; color: #495057; }
        .c-text.correct { color: #212529; font-weight: 500; }
        .answer-box { background: #212529; border-radius: 8px; padding: 14px 22px; color: white; text-align: center; }
        .answer-text { font-size: 20px; font-weight: 500; }
    </style>
</head>
<body>
    <div class="slide-container">
        <div class="header">
            <h1>第6回 確認クイズ</h1>
            <div class="divider"></div>
        </div>
        <div class="content-area">
            <h2>HTML/CSS の基礎を確認しよう</h2>
            <div class="quiz-grid">
                <div class="quiz-card">
                    <div class="q-num">Q1</div>
                    <div class="q-text">Webページの「デザイン・見た目」を担当するのは？</div>
                    <div class="choices">
                        <div class="choice"><span class="c-label">A</span><span class="c-text">HTML</span></div>
                        <div class="choice correct"><span class="c-label correct">B</span><span class="c-text correct">CSS</span></div>
                        <div class="choice"><span class="c-label">C</span><span class="c-text">JavaScript</span></div>
                    </div>
                </div>
                <div class="quiz-card">
                    <div class="q-num">Q2</div>
                    <div class="q-text">要素の「内側の余白」を設定するCSSプロパティは？</div>
                    <div class="choices">
                        <div class="choice"><span class="c-label">A</span><span class="c-text">margin</span></div>
                        <div class="choice correct"><span class="c-label correct">B</span><span class="c-text correct">padding</span></div>
                        <div class="choice"><span class="c-label">C</span><span class="c-text">border</span></div>
                    </div>
                </div>
                <div class="quiz-card">
                    <div class="q-num">Q3</div>
                    <div class="q-text">CSSで横並びレイアウトを実現する方法は？</div>
                    <div class="choices">
                        <div class="choice"><span class="c-label">A</span><span class="c-text">display: block</span></div>
                        <div class="choice correct"><span class="c-label correct">B</span><span class="c-text correct">display: flex</span></div>
                        <div class="choice"><span class="c-label">C</span><span class="c-text">display: none</span></div>
                    </div>
                </div>
                <div class="quiz-card">
                    <div class="q-num">Q4</div>
                    <div class="q-text">HTMLタグは必ず何をしなければいけない？</div>
                    <div class="choices">
                        <div class="choice"><span class="c-label">A</span><span class="c-text">大文字で書く</span></div>
                        <div class="choice"><span class="c-label">B</span><span class="c-text">CSSと一緒に使う</span></div>
                        <div class="choice correct"><span class="c-label correct">C</span><span class="c-text correct">閉じタグで閉じる</span></div>
                    </div>
                </div>
            </div>
            <div class="answer-box">
                <div class="answer-text">正解：Q1→B / Q2→B / Q3→B / Q4→C</div>
            </div>
        </div>
    </div>
</body>
</html>

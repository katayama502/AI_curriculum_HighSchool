<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: "Yu Gothic", "Roboto", sans-serif; background-color: #F8F9FA; color: #212529; }
        .slide-container { width: 1280px; min-height: 720px; background-color: #F8F9FA; position: relative; overflow: hidden; }
        .header { padding: 40px 60px 0; }
        h1 { font-size: 48px; font-weight: 500; color: #339AF0; margin-bottom: 10px; }
        .divider { height: 1px; background-color: #20C997; margin-top: 20px; width: 100%; }
        .content-area { padding: 30px 60px; }
        .agenda-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 10px; }
        .agenda-item { background: white; border-radius: 8px; padding: 24px 28px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); display: flex; align-items: flex-start; gap: 20px; }
        .agenda-num { font-size: 36px; font-weight: 700; color: #339AF0; min-width: 50px; line-height: 1; }
        .agenda-text h3 { font-size: 24px; font-weight: 500; color: #212529; margin-bottom: 6px; }
        .agenda-text p { font-size: 18px; font-weight: 300; color: #495057; line-height: 1.5; }
        .agenda-item.highlight { border-left: 4px solid #339AF0; }
        .agenda-item.highlight2 { border-left: 4px solid #20C997; }
        .agenda-item.highlight3 { border-left: 4px solid #212529; }
        .agenda-item.highlight4 { border-left: 4px solid #E67700; }
        .goal-bar { background: #212529; color: white; padding: 16px 28px; border-radius: 8px; margin-top: 20px; display: flex; align-items: center; gap: 16px; }
        .goal-bar i { font-size: 28px; color: #20C997; }
        .goal-bar span { font-size: 22px; font-weight: 300; }
        .goal-bar strong { color: #339AF0; }
    </style>
</head>
<body>
    <div class="slide-container">
        <div class="header">
            <h1>今日の授業の流れ</h1>
            <div class="divider"></div>
        </div>
        <div class="content-area">
            <div class="agenda-grid">
                <div class="agenda-item highlight">
                    <div class="agenda-num">01</div>
                    <div class="agenda-text">
                        <h3>AIとは何か？</h3>
                        <p>人工知能の定義・歴史・種類をわかりやすく整理する</p>
                    </div>
                </div>
                <div class="agenda-item highlight2">
                    <div class="agenda-num">02</div>
                    <div class="agenda-text">
                        <h3>生成AIの仕組み</h3>
                        <p>LLM（大規模言語モデル）が文章を生成するメカニズム</p>
                    </div>
                </div>
                <div class="agenda-item highlight3">
                    <div class="agenda-num">03</div>
                    <div class="agenda-text">
                        <h3>Claudeとは？</h3>
                        <p>Anthropic社が開発したAI・特徴・他のAIとの違い</p>
                    </div>
                </div>
                <div class="agenda-item highlight4">
                    <div class="agenda-num">04</div>
                    <div class="agenda-text">
                        <h3>実際に使ってみよう</h3>
                        <p>アカウント作成・画面の見方・初めての会話体験</p>
                    </div>
                </div>
            </div>
            <div class="goal-bar">
                <i class="fas fa-bullseye"></i>
                <span>今日のゴール：AIとClaudeの基本を理解し、<strong>自分でClaudeと会話できる</strong>ようになる</span>
            </div>
        </div>
    </div>
</body>
</html>
